<hr>
<div class="container-fluid">
    <p>{{ isInviteFlow ? 'Ορισμός Κωδικού Πρόσβασης' : 'Αλλαγή Κωδικού Πρόσβασης' }}</p>
    <p *ngIf="isInviteFlow && inviteEmail" class="text-muted small">{{ inviteEmail }}</p>
</div>
<hr>

<div class="container-fluid">
    <form (ngSubmit)="onSubmit()">

        <!-- Current password (only for logged-in users) -->
        <div *ngIf="!isInviteFlow" class="mb-3">
            <label for="currentPassword" class="form-label">Τρέχων κωδικός</label>
            <input type="password" class="form-control" id="currentPassword" name="currentPassword"
                [(ngModel)]="currentPassword" required>
        </div>

        <!-- New password -->
        <div class="mb-3">
            <label for="newPassword" class="form-label">Νέος κωδικός</label>
            <input type="password" class="form-control" id="newPassword" name="newPassword"
                [(ngModel)]="newPassword" required>
        </div>

        <!-- Confirm password -->
        <div class="mb-3">
            <label for="confirmPassword" class="form-label">Επαλήθευση κωδικού</label>
            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                [(ngModel)]="confirmPassword" required>
        </div>

        <!-- Validation messages -->
        <div *ngIf="newPassword.length > 0 && !passwordLongEnough" class="mb-3">
            <small class="text-danger">Ο κωδικός πρέπει να περιέχει τουλάχιστον 6 χαρακτήρες.</small>
        </div>
        <div *ngIf="confirmPassword.length > 0 && newPassword.length > 0 && !passwordsMatch" class="mb-3">
            <small class="text-danger">Οι κωδικοί πρόσβασης δεν ταιριάζουν.</small>
        </div>

        <!-- Submit button -->
        <div class="d-grid mb-3">
            <button type="submit" class="btn btn-primary" [disabled]="!canSubmit">
                <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-1" role="status"></span>
                {{ isInviteFlow ? 'Ορισμός Κωδικού' : 'Αλλαγή Κωδικού' }}
            </button>
        </div>

        <!-- Result message -->
        <div *ngIf="message" class="alert" [ngClass]="'alert-' + messageType" role="alert">
            {{ message }}
        </div>

    </form>
</div>
