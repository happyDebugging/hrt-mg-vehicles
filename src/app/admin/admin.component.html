<div class="content-container">
  <h2 class="section-title">Κεντρο Διαχειρισης</h2>

  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center" style="cursor: pointer"
      (click)="isUsersCollapsed = !isUsersCollapsed">
      <strong>Διαχείριση Λογαριασμών</strong>
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"
        [style.transform]="isUsersCollapsed ? 'rotate(0)' : 'rotate(180deg)'" style="transition: transform .25s ease">
        <path fill-rule="evenodd"
          d="M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708" />
      </svg>
    </div>
    <div *ngIf="!isUsersCollapsed" class="card-body">
      <div class="mb-3">
        <label for="userManagementAction" class="form-label">Ενεργεια</label>
        <select class="form-select" name="userManagementAction" [(ngModel)]="userManagementAction"
          (change)="ClearFieldValues()" required>
          <option value="create_user">Δημιουργία νέου χρήστη</option>
          <option value="update_user">Επεξεργασία χρήστη</option>
          <option value="delete_user">Διαγραφή λογαριασμού</option>
        </select>
      </div>

      <div *ngIf="userManagementAction == 'update_user' || userManagementAction == 'delete_user'" class="mb-3">
        <label for="user" class="form-label">Λογαριασμος χρηστη</label>
        <select class="form-select" name="user" [(ngModel)]="userToManage" (change)="ManageSelectedUserDetails()"
          required>
          <option *ngFor="let user of users; index as i;" [value]="user.UserId">
            {{ user.FirstName }} {{ user.LastName }}
          </option>
        </select>
      </div>

      <div *ngIf="userManagementAction == 'create_user' || userManagementAction == 'update_user'">
        <div class="row g-3 mb-3">
          <div class="col-12 col-md-6">
            <label for="newUserFirstName" class="form-label">Ονομα</label>
            <input type="text" class="form-control" id="newUserFirstName" [(ngModel)]="newUserFirstName">
          </div>
          <div class="col-12 col-md-6">
            <label for="newUserLastName" class="form-label">Επιθετο</label>
            <input type="text" class="form-control" id="newUserLastName" [(ngModel)]="newUserLastName">
          </div>
        </div>

        <div class="mb-3">
          <label for="newUserEmail" class="form-label">Email</label>
          <input type="email" class="form-control" id="newUserEmail" [(ngModel)]="newUserEmail">
        </div>

        <div class="mb-3">
          <label for="newUserPermissions" class="form-label">Δικαιωματα</label>
          <select class="form-select" name="newUserPermissions" [(ngModel)]="newUserPermissions" required>
            <option value="user">Οδηγός</option>
            <option value="admin">Διαχειριστής</option>
          </select>
          <div *ngIf="userManagementAction == 'update_user'" class="form-text text-accent">
            Η ενημέρωση των δικαιωμάτων πραγματοποιείται στην επόμενη σύνδεση του χρήστη στην εφαρμογή.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Οχηματα</label>
          <div class="row g-2">
            <div *ngFor="let vehicle of vehicleOptions" class="col-12 col-sm-6 col-md-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" [value]="vehicle.value"
                  [id]="'vehicle_' + vehicle.value" [checked]="newUserVehicleDriven.includes(vehicle.value)"
                  (change)="toggleVehicle(vehicle.value)">
                <label class="form-check-label" [for]="'vehicle_' + vehicle.value">
                  {{ vehicle.label }}
                </label>
              </div>
            </div>
          </div>
        </div>

        <!-- License preview for update (bottom) -->
        <div
          *ngIf="userManagementAction == 'update_user' && (userVehicleLicenses.length > 0 || userBoatLicenses.length > 0)"
          class="mb-3 mt-4">
          <label class="form-label">Διαθεσιμες Αδειες Οδηγησης και Σκαφων</label>
          <div class="d-flex flex-wrap gap-3">
            <div *ngIf="userVehicleLicenses.length > 0">
              <button *ngIf="userVehicleLicenses[0]?.fileName || userVehicleLicenses[0]?.name" type="button"
                class="btn btn-theme-outline btn-sm"
                (click)="downloadLicense(userVehicleLicenses[0].fileName || userVehicleLicenses[0].name, 'vehicle')">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" class="me-1"
                  viewBox="0 0 16 16">
                  <path
                    d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5" />
                  <path
                    d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708z" />
                </svg>
                Διπλωμα Οδηγησης
              </button>
            </div>
            <div *ngIf="userBoatLicenses.length > 0">
              <button *ngIf="userBoatLicenses[0]?.fileName || userBoatLicenses[0]?.name" type="button"
                class="btn btn-theme-outline btn-sm"
                (click)="downloadLicense(userBoatLicenses[0].fileName || userBoatLicenses[0].name, 'boat')">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" class="me-1"
                  viewBox="0 0 16 16">
                  <path
                    d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5" />
                  <path
                    d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708z" />
                </svg>
                Διπλωμα Σκαφους
              </button>
            </div>
          </div>
        </div>

      </div>

      <!-- Action Buttons -->
      <div class="d-grid mt-4">
        <div *ngIf="userManagementAction == 'create_user'">
          <div *ngIf="!isUserCreationSuccessfull" class="d-grid">
            <button type="submit" class="btn btn-accent" (click)="CreateUser()">Δημιουργία λογαριασμού</button>
          </div>
          <div *ngIf="isUserCreationSuccessfull" class="d-grid">
            <button type="button" class="btn btn-accent" disabled>Επιτυχής δημιουργία!</button>
          </div>
        </div>
        <div *ngIf="userManagementAction == 'update_user'">
          <div *ngIf="!isUserUpdateSuccessfull" class="d-grid">
            <button type="submit" class="btn btn-accent" (click)="UpdateUser()">Ενημέρωση λογαριασμού</button>
          </div>
          <div *ngIf="isUserUpdateSuccessfull" class="d-grid">
            <button type="button" class="btn btn-accent" disabled>Επιτυχής ενημέρωση!</button>
          </div>
        </div>
        <div *ngIf="userManagementAction == 'delete_user'">
          <div *ngIf="!isUserDeletionSuccessfull" class="d-grid">
            <button type="submit" class="btn btn-danger" (click)="DeleteUser()">Διαγραφή λογαριασμού</button>
          </div>
          <div *ngIf="isUserDeletionSuccessfull" class="d-grid">
            <button type="button" class="btn btn-accent" disabled>Επιτυχής διαγραφή!</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Vehicle Management Collapse -->
  <div class="card mt-4">
    <div class="card-header d-flex justify-content-between align-items-center" style="cursor: pointer"
      (click)="isVehiclesCollapsed = !isVehiclesCollapsed">
      <strong>Διαχείριση Οχημάτων</strong>
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"
        [style.transform]="isVehiclesCollapsed ? 'rotate(0)' : 'rotate(180deg)'"
        style="transition: transform .25s ease">
        <path fill-rule="evenodd"
          d="M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708" />
      </svg>
    </div>
    <div *ngIf="!isVehiclesCollapsed" class="card-body">

      <div class="mb-3">
        <label for="vehicleAction" class="form-label">Ενεργεια</label>
        <select class="form-select" name="vehicleAction" [(ngModel)]="vehicleAction"
          (change)="ClearVehicleFields(); vehicleMessage=''; vehicleMessageType=''">
          <option value="add_vehicle">Προσθήκη οχήματος</option>
          <option value="update_vehicle">Επεξεργασία οχήματος</option>
          <option value="delete_vehicle">Διαγραφή οχήματος</option>
        </select>
      </div>

      <!-- Add Vehicle -->
      <div *ngIf="vehicleAction === 'add_vehicle'">
        <div class="row g-3 mb-3">
          <div class="col-12 col-md-6">
            <label for="newVehicleName" class="form-label">Ονομα οχηματος</label>
            <input type="text" class="form-control" id="newVehicleName" [(ngModel)]="newVehicleName"
              placeholder="π.χ. Toyota-HILUX">
          </div>
          <div class="col-12 col-md-6">
            <label for="newVehicleType" class="form-label">Τυπος</label>
            <select class="form-select" name="newVehicleType" [(ngModel)]="newVehicleType">
              <option value="vehicle">Όχημα</option>
              <option value="boat">Σκάφος</option>
            </select>
          </div>
          <div class="col-12 col-md-6" *ngIf="newVehicleType === 'vehicle'">
            <label for="newVehiclePlateNumber" class="form-label">Αριθμος Πινακιδας</label>
            <input type="text" class="form-control" id="newVehiclePlateNumber" [(ngModel)]="newVehiclePlateNumber"
              placeholder="π.χ. YYY-1234">
          </div>
          <div class="col-12 col-md-6" *ngIf="newVehicleType === 'boat'">
            <label for="newVesselRegistrationNumber" class="form-label">Αριθμος Νηολογιου</label>
            <input type="text" class="form-control" id="newVesselRegistrationNumber"
              [(ngModel)]="newVesselRegistrationNumber" placeholder="π.χ. ΝΗΟ-5678">
          </div>
        </div>

        <div class="col-12 col-md-6">
          <label for="initialKilometers" class="form-label">Αρχικα Χιλιομετρα Οχηματος</label>
          <input type="text" class="form-control" id="initialKilometers" [(ngModel)]="initialKilometers">
        </div>

        <div class="mb-3">
          <label for="vehiclePhoto" class="form-label">Φωτογραφια οχηματος</label>
          <input class="form-control" type="file" accept=".jpg,.jpeg,.png" id="vehiclePhoto"
            (change)="OnVehiclePhotoSelected($event)">
          <small class="text-muted">Αποδεκτά αρχεία: PDF, Word, JPG, PNG</small>
        </div>
      </div>

      <!-- Delete Vehicle -->
      <div *ngIf="vehicleAction === 'delete_vehicle'" class="mb-3">
        <label for="vehicleToDelete" class="form-label">Επιλογη οχηματος</label>
        <select class="form-select" name="vehicleToDelete" [(ngModel)]="vehicleToDelete">
          <option [ngValue]="0" disabled>-- Επιλέξτε --</option>
          <option *ngFor="let v of vehicles" [ngValue]="v.id">{{ v.name }} ({{ v.type }})</option>
        </select>
      </div>

      <!-- Update Vehicle -->
      <div *ngIf="vehicleAction === 'update_vehicle'">
        <div class="mb-3">
          <label for="vehicleToUpdate" class="form-label">Επιλογη οχηματος</label>
          <select class="form-select" name="vehicleToUpdate" [(ngModel)]="vehicleToUpdate"
            (change)="ManageSelectedVehicleDetails()">
            <option [ngValue]="0" disabled>-- Επιλέξτε --</option>
            <option *ngFor="let v of vehicles" [ngValue]="v.id">{{ v.name }} ({{ v.type }})</option>
          </select>
        </div>

        <div *ngIf="vehicleToUpdate" class="row g-3 mb-3">
          <div class="col-12 col-md-6">
            <label for="updateVehicleName" class="form-label">Ονομα οχηματος</label>
            <input type="text" class="form-control" id="updateVehicleName" [(ngModel)]="updateVehicleName">
          </div>
          <div class="col-12 col-md-6">
            <label for="updateVehicleType" class="form-label">Τυπος</label>
            <select class="form-select" name="updateVehicleType" [(ngModel)]="updateVehicleType">
              <option value="vehicle">Όχημα</option>
              <option value="boat">Σκάφος</option>
            </select>
          </div>
          <div class="col-12 col-md-6" *ngIf="updateVehicleType === 'vehicle'">
            <label for="updateVehiclePlateNumber" class="form-label">Αριθμος Πινακιδας</label>
            <input type="text" class="form-control" id="updateVehiclePlateNumber" [(ngModel)]="updateVehiclePlateNumber"
              placeholder="π.χ. YYY-1234">
          </div>
          <div class="col-12 col-md-6" *ngIf="updateVehicleType === 'boat'">
            <label for="updateVesselRegistrationNumber" class="form-label">Αριθμος Νηολογιου</label>
            <input type="text" class="form-control" id="updateVesselRegistrationNumber"
              [(ngModel)]="updateVesselRegistrationNumber" placeholder="π.χ. ΝΗΟ-5678">
          </div>
          <div class="col-12 col-md-6">
            <label for="initialKilometers" class="form-label">Αρχικα Χιλιομετρα Οχηματος</label>
            <input type="text" class="form-control" id="initialKilometers" [(ngModel)]="initialKilometers">
          </div>
          <div class="col-12">
            <label for="updateVehiclePhoto" class="form-label">Αντικατασταση φωτογραφιας</label>
            <input class="form-control" type="file" accept=".jpg,.jpeg,.png" id="updateVehiclePhoto"
              (change)="OnUpdateVehiclePhotoSelected($event)">
            <small class="text-muted">Αφήστε κενό για να διατηρήσετε την υπάρχουσα φωτογραφία</small>
          </div>
        </div>
      </div>

      <!-- Message -->
      <div *ngIf="vehicleMessage" class="alert mb-3"
        [ngClass]="{'alert-success': vehicleMessageType === 'success', 'alert-danger': vehicleMessageType === 'danger'}"
        role="alert">
        {{ vehicleMessage }}
      </div>

      <!-- Action Buttons -->
      <div class="d-grid">
        <div *ngIf="vehicleAction === 'add_vehicle'">
          <div *ngIf="!isVehicleActionSuccessfull" class="d-grid">
            <button type="button" class="btn btn-accent" (click)="AddVehicle()">Προσθήκη οχήματος</button>
          </div>
          <div *ngIf="isVehicleActionSuccessfull" class="d-grid">
            <button type="button" class="btn btn-accent" disabled>Επιτυχής προσθήκη!</button>
          </div>
        </div>
        <div *ngIf="vehicleAction === 'update_vehicle'">
          <div *ngIf="!isVehicleActionSuccessfull" class="d-grid">
            <button type="button" class="btn btn-accent" (click)="UpdateVehicle()">Ενημέρωση οχήματος</button>
          </div>
          <div *ngIf="isVehicleActionSuccessfull" class="d-grid">
            <button type="button" class="btn btn-accent" disabled>Επιτυχής ενημέρωση!</button>
          </div>
        </div>
        <div *ngIf="vehicleAction === 'delete_vehicle'">
          <div *ngIf="!isVehicleActionSuccessfull" class="d-grid">
            <button type="button" class="btn btn-danger" (click)="DeleteVehicle()">Διαγραφή οχήματος</button>
          </div>
          <div *ngIf="isVehicleActionSuccessfull" class="d-grid">
            <button type="button" class="btn btn-accent" disabled>Επιτυχής διαγραφή!</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
