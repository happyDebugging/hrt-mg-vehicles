<div class="content-container">
  <h2 class="section-title">Προφιλ</h2>

  <!-- User Name -->
  <div class="card mb-4">
    <div class="card-body">
      <label for="userName" class="form-label">Ονομα</label>
      <input type="text" class="form-control" id="userName" [(ngModel)]="userName" readonly>
    </div>
  </div>

  <!-- License Cards Heading -->
  <h6 class="mb-3" style="text-transform:uppercase; font-weight:700; letter-spacing:.06em; font-size:.8rem;">Αδειες Οδηγησης</h6>

  <!-- License Cards -->
  <div *ngFor="let card of licenseCards" class="card mb-3">
    <div class="card-header d-flex align-items-center">
      <svg *ngIf="card.type === 'vehicle'" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
        fill="currentColor" class="me-2" viewBox="0 0 16 16">
        <path d="M0 3.5A1.5 1.5 0 0 1 1.5 2h9A1.5 1.5 0 0 1 12 3.5V5h1.02a1.5 1.5 0 0 1 1.17.563l1.481 1.85a1.5 1.5 0 0 1 .329.938V10.5a1.5 1.5 0 0 1-1.5 1.5H14a2 2 0 1 1-4 0H5a2 2 0 1 1-3.998-.085A1.5 1.5 0 0 1 0 10.5zm1.294 7.456A2 2 0 0 1 4.732 11h5.536a2 2 0 0 1 .732-.732V3.5a.5.5 0 0 0-.5-.5h-9a.5.5 0 0 0-.5.5v7a.5.5 0 0 0 .294.456M12 10a2 2 0 0 1 1.732 1h.768a.5.5 0 0 0 .5-.5V8.35a.5.5 0 0 0-.11-.312l-1.48-1.85A.5.5 0 0 0 13.02 6H12zm-9 1a1 1 0 1 0 0 2 1 1 0 0 0 0-2m9 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2"/>
      </svg>
      <svg *ngIf="card.type === 'boat'" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
        fill="currentColor" class="me-2" viewBox="0 0 16 16">
        <path d="M.036 3.314a.5.5 0 0 1 .65-.278l1.757.703a1.5 1.5 0 0 0 1.114 0l1.014-.406a2.5 2.5 0 0 1 1.857 0l1.015.406a1.5 1.5 0 0 0 1.114 0l1.014-.406a2.5 2.5 0 0 1 1.857 0l1.015.406a1.5 1.5 0 0 0 1.114 0l1.757-.703a.5.5 0 1 1 .372.928l-1.758.703a2.5 2.5 0 0 1-1.857 0l-1.014-.406a1.5 1.5 0 0 0-1.114 0l-1.015.406a2.5 2.5 0 0 1-1.857 0l-1.014-.406a1.5 1.5 0 0 0-1.114 0l-1.015.406a2.5 2.5 0 0 1-1.857 0L.314 3.964a.5.5 0 0 1-.278-.65m0 3a.5.5 0 0 1 .65-.278l1.757.703a1.5 1.5 0 0 0 1.114 0l1.014-.406a2.5 2.5 0 0 1 1.857 0l1.015.406a1.5 1.5 0 0 0 1.114 0l1.014-.406a2.5 2.5 0 0 1 1.857 0l1.015.406a1.5 1.5 0 0 0 1.114 0l1.757-.703a.5.5 0 1 1 .372.928l-1.758.703a2.5 2.5 0 0 1-1.857 0l-1.014-.406a1.5 1.5 0 0 0-1.114 0l-1.015.406a2.5 2.5 0 0 1-1.857 0l-1.014-.406a1.5 1.5 0 0 0-1.114 0l-1.015.406a2.5 2.5 0 0 1-1.857 0L.314 6.964a.5.5 0 0 1-.278-.65m0 3a.5.5 0 0 1 .65-.278l1.757.703a1.5 1.5 0 0 0 1.114 0l1.014-.406a2.5 2.5 0 0 1 1.857 0l1.015.406a1.5 1.5 0 0 0 1.114 0l1.014-.406a2.5 2.5 0 0 1 1.857 0l1.015.406a1.5 1.5 0 0 0 1.114 0l1.757-.703a.5.5 0 1 1 .372.928l-1.758.703a2.5 2.5 0 0 1-1.857 0l-1.014-.406a1.5 1.5 0 0 0-1.114 0l-1.015.406a2.5 2.5 0 0 1-1.857 0l-1.014-.406a1.5 1.5 0 0 0-1.114 0l-1.015.406a2.5 2.5 0 0 1-1.857 0L.314 9.964a.5.5 0 0 1-.278-.65"/>
      </svg>
      <strong>{{ card.label }}</strong>
      <span class="badge ms-auto" [ngClass]="card.type === 'boat' ? 'text-bg-info' : 'bg-dark-theme'">
        {{ card.type === 'boat' ? 'Σκάφος' : 'Όχημα' }}
      </span>
    </div>
    <div class="card-body">
      <div class="mb-3">
        <small class="text-muted">
          <span *ngFor="let vName of card.vehicleNames; let last = last">
            {{ vName }}<span *ngIf="!last">, </span>
          </span>
        </small>
      </div>

      <!-- Download / Status Row -->
      <div *ngIf="card.hasLicense" class="d-flex align-items-center flex-wrap gap-2 mb-3">
        <button type="button" class="btn btn-theme-outline btn-sm" (click)="downloadLicense(card)">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" class="me-1" viewBox="0 0 16 16">
            <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/>
            <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708z"/>
          </svg>
          Ληψη Διπλωματος
        </button>
        <span class="text-success">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16">
            <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
          </svg>
          <small>Ανεβασμένο</small>
        </span>
      </div>

      <div *ngIf="!card.hasLicense" class="mb-3">
        <span class="text-muted">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
            <path d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0M7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0z"/>
          </svg>
          <small>Δεν έχει ανεβεί δίπλωμα</small>
        </span>
      </div>

      <!-- Upload Input -->
      <div class="mb-2">
        <label [for]="'file_' + card.type" class="form-label">Ανεβασμα Διπλωματος</label>
        <input class="form-control form-control-sm" type="file" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png"
          [id]="'file_' + card.type" (change)="onFileSelected($event, card)" [disabled]="card.isUploading">
        <small class="text-muted">Αποδεκτά αρχεία: PDF, Word, JPG, PNG</small>
      </div>

      <div *ngIf="card.selectedFile" class="d-grid mb-2">
        <button type="button" class="btn btn-accent btn-sm" (click)="uploadLicense(card)" [disabled]="card.isUploading">
          Ανέβασμα
        </button>
      </div>

      <div *ngIf="card.message" class="alert py-1 px-2"
        [ngClass]="{'alert-success': card.message.includes('επιτυχία'), 'alert-danger': card.message.includes('Σφάλμα'), 'alert-warning': !card.message.includes('επιτυχία') && !card.message.includes('Σφάλμα')}"
        role="alert">
        <small>{{ card.message }}</small>
      </div>
    </div>
  </div>
</div>
